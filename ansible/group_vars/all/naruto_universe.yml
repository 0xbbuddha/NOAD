# Machine accounts to mark as "trusted for delegation" (unconstrained
# Kerberos delegation). anbu-srv01 becomes a collection point for
# tickets/TGTs of any account (including Domain Admin) that authenticates to it.
ad_unconstrained_delegation_computers:
  - anbu-srv01

# Deliberately dangerous ACLs: trustee holds "right" over target.
# "right" must match a value of the
# System.DirectoryServices.ActiveDirectoryRights enum (GenericWrite also
# covers writing msDS-KeyCredentialLink -> "Shadow Credentials" abuse).
ad_acl_grants:
  - trustee: sasuke.uchiha
    target: sakura.haruno
    right: GenericAll
  - trustee: danzo.shimura
    target: hiruzen.sarutobi
    right: GenericWrite
  - trustee: svc_inventory
    target: "mission-srv01$"
    right: GenericWrite
  - trustee: mizuki.touji
    target: konohamaru.sarutobi
    right: GenericWrite
  - trustee: kabuto.yakushi
    target: GG_ProjectPhoenix
    right: GenericAll

# Group nesting forgotten over time: GG_Hokage is the "legitimate" nesting
# (Tsunade = de facto Domain Admin), GG_LegacyAdmins is the real weakness
# (temporary delegation never cleaned up).
ad_group_nesting:
  - child: GG_Hokage
    parent: "Domain Admins"
  - child: GG_LegacyAdmins
    parent: "Domain Admins"

# Accounts/groups over-provisioned with full replication rights (DCSync:
# DS-Replication-Get-Changes + DS-Replication-Get-Changes-All).
ad_dcsync_grants:
  - svc_monitoring

# Local groups to populate on member servers/workstations (beyond the domain join).
local_admin_grants:
  anbu-srv01:
    - "{{ domain_netbios }}\\GG_ANBU"
    - "{{ domain_netbios }}\\GG_IT"
  mission-srv01:
    - "{{ domain_netbios }}\\svc_backup"
    - "{{ domain_netbios }}\\GG_TempAdmins"
    - "{{ domain_netbios }}\\zabuza.momochi"
  academy-ws01:
    - "{{ domain_netbios }}\\kakashi.hatake"
    - "{{ domain_netbios }}\\GG_Jonin"
