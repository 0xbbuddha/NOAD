# NOAD (Naruto Oriented Active Directory) data model, consumed by the
# users_and_groups and vulnerabilities roles. sAMAccountName convention:
# firstname.lastname in lowercase, so that public OSINT enumeration (e.g.
# the list of Naruto characters on Wikipedia) directly yields plausible
# account names.

ad_base_dn: "DC={{ domain_netbios | lower }},DC=local"
ad_village_ou: "OU=Village,{{ ad_base_dn }}"
ad_administration_ou: "OU=Administration,{{ ad_village_ou }}"
ad_academy_ou: "OU=Academy,{{ ad_village_ou }}"
ad_anbu_ou: "OU=ANBU,{{ ad_village_ou }}"
ad_medical_ou: "OU=Medical,{{ ad_village_ou }}"
ad_mission_ou: "OU=Mission,{{ ad_village_ou }}"
ad_finance_ou: "OU=Finance,{{ ad_village_ou }}"
ad_research_ou: "OU=Research,{{ ad_village_ou }}"
ad_it_ou: "OU=IT,{{ ad_village_ou }}"
ad_servers_ou: "OU=Servers,{{ ad_base_dn }}"
ad_workstations_ou: "OU=Workstations,{{ ad_base_dn }}"
ad_service_accounts_ou: "OU=Service Accounts,{{ ad_base_dn }}"
ad_privileged_ou: "OU=Privileged,{{ ad_base_dn }}"

ad_ous:
  # "parent_path" = the container the OU is created in (the microsoft.ad.ou
  # module expects the PARENT's path in "path", not the OU's own full DN).
  # Order matters: Village must exist before its sub-OUs.
  - name: Village
    parent_path: "{{ ad_base_dn }}"
  - name: Administration
    parent_path: "{{ ad_village_ou }}"
  - name: Academy
    parent_path: "{{ ad_village_ou }}"
  - name: ANBU
    parent_path: "{{ ad_village_ou }}"
  - name: Medical
    parent_path: "{{ ad_village_ou }}"
  - name: Mission
    parent_path: "{{ ad_village_ou }}"
  - name: Finance
    parent_path: "{{ ad_village_ou }}"
  - name: Research
    parent_path: "{{ ad_village_ou }}"
  - name: IT
    parent_path: "{{ ad_village_ou }}"
  - name: Servers
    parent_path: "{{ ad_base_dn }}"
  - name: Workstations
    parent_path: "{{ ad_base_dn }}"
  - name: Service Accounts
    parent_path: "{{ ad_base_dn }}"
  - name: Privileged
    parent_path: "{{ ad_base_dn }}"

