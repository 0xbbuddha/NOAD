---
- name: Point DNS to hokage-dc01 (otherwise the domain isn't resolvable via SRV records)
  ansible.windows.win_dns_client:
    adapter_names: "*"
    dns_servers:
      - "{{ hostvars['hokage-dc01'].ansible_host }}"

- name: Join the {{ domain_name }} domain
  microsoft.ad.membership:
    dns_domain_name: "{{ domain_name }}"
    hostname: "{{ inventory_hostname }}"
    domain_admin_user: "{{ domain_admin_upn }}"
    domain_admin_password: "{{ domain_admin_password }}"
    state: domain
    reboot: true
  register: join_result
